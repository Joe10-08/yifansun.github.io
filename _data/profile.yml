short_bio: >-
  <p>
    I currently work as a professor at the School of Statistics, Renmin University of China.  I received  my Doctor of Science in Fundamental Mathematics (2013) and my Bachelor of Science in Mathematics and Applied Mathematics (2007) from Beihang University.
  </p>
  <p>
    My research focuses on multi-source heterogeneous data analysis, federated learning, distributed optimization, and large language model privacy.
  </p>

